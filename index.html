window.buyPlan=id=>{let p=plans.find(x=>x.id==id)||[{id:'standard',name:'Standard',price:15},{id:'plus',name:'Plus',price:30},{id:'pro',name:'Pro',price:60}].find(x=>x.id==id)||plans[0];modal(`<h2>Buy ${p.name}</h2><p>Pay <b>${money(p.price)}</b> to admin payment ID:</p><div class="payid">${settings.paymentId||'Set by admin'}</div><input id="coupon" placeholder="Coupon code optional"><input id="txid" placeholder="Transaction ID / TXID"><textarea id="note" placeholder="Payment account info / notes"></textarea><button class="primary full" onclick="submitOrder('${p.id}')">Submit Payment Request</button>`)};

function drawEarnChart(a,b,c){let cv=$('#earnChart');if(!cv)return;let ctx=cv.getContext('2d'),w=cv.width=cv.offsetWidth,h=cv.height=180,vals=[a,b,c],max=Math.max(...vals,1);ctx.clearRect(0,0,w,h);ctx.lineWidth=3;ctx.strokeStyle='rgba(255,255,255,.12)';for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(0,i*h/4);ctx.lineTo(w,i*h/4);ctx.stroke()}vals.forEach((v,i)=>{let bw=Math.min(92,w/6),bh=(v/max)*(h-55)+8,x=40+i*(w-95)/2,y=h-bh-25,g=ctx.createLinearGradient(0,y,0,h);g.addColorStop(0,['#36e8a6','#24c6ff','#b46dff'][i]);g.addColorStop(1,['#138d69','#245cff','#6d5dfc'][i]);ctx.fillStyle=g;ctx.roundRect(x,y,bw,bh,16);ctx.fill();ctx.fillStyle='#a9bdd4';ctx.font='13px Arial';ctx.fillText(['30D','1Y','Total'][i],x+8,h-4)})}function drawPublicChart(){let cv=$('#publicChart');if(!cv)return;let ctx=cv.getContext('2d'),w=cv.width=cv.offsetWidth,h=cv.height=150,pts=[.18,.25,.38,.35,.55,.65,.72,.9];ctx.clearRect(0,0,w,h);ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(0,i*h/4);ctx.lineTo(w,i*h/4);ctx.stroke()}let g=ctx.createLinearGradient(0,0,w,0);g.addColorStop(0,'#36e8a6');g.addColorStop(.5,'#24c6ff');g.addColorStop(1,'#b46dff');ctx.strokeStyle=g;ctx.lineWidth=5;ctx.beginPath();pts.forEach((p,i)=>{let x=i*w/(pts.length-1),y=h-p*(h-25)-10;i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke()}
onAuthStateChanged(auth,u=>{me=u;if(!u){boot();return}onSnapshot(doc(db,'users',u.uid),s=>{profile=s.data()||{};boot()});onSnapshot(query(collection(db,'orders'),where('userId','==',u.uid)),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()}));boot()});onSnapshot(query(collection(db,'referralEarnings'),where('userId','==',u.uid)),s=>{earnings=s.docs.map(d=>({id:d.id,...d.data()}));boot()});onSnapshot(query(collection(db,'withdrawalRequests'),where('userId','==',u.uid)),s=>{withdrawals=s.docs.map(d=>({id:d.id,...d.data()}));boot()})});onSnapshot(collection(db,'plans'),s=>{plans=s.docs.map(d=>({id:d.id,...d.data()}));boot()});onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));boot()});onSnapshot(collection(db,'coupons'),s=>{coupons=s.docs.map(d=>({id:d.id,...d.data()}))});onSnapshot(collection(db,'communityLinks'),s=>{links=s.docs.map(d=>({id:d.id,...d.data()}));boot()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};boot()});

<style>

.nav button:hover,.nav button.active{color:var(--text);background:linear-gradient(135deg,rgba(36,198,255,.18),rgba(109,93,252,.18));box-shadow:inset 0 0 0 1px rgba(125,249,255,.22)}.side-card{margin-top:24px;padding:16px;border:1px solid var(--line);border-radius:14px;background:linear-gradient(135deg,rgba(36,198,255,.2),rgba(109,93,252,.16),rgba(255,255,255,.06))}.side-card p,.muted{color:var(--muted);line-height:1.55}.main{padding:22px;min-width:0}.topbar{position:sticky;top:0;z-index:4;display:flex;gap:16px;align-items:center;padding:14px 0 20px;background:linear-gradient(180deg,rgba(3,8,23,.96),rgba(3,8,23,0))}.mobile-menu{display:none;width:42px;height:42px}.title h2,.section-head h2{margin:0;font-size:clamp(26px,4vw,44px)}.title p,.section-head p{margin:7px 0 0;color:var(--muted);line-height:1.5}.page{display:none}.page.active{display:block}.panel{border:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.06));border-radius:22px;padding:22px;box-shadow:var(--shadow)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:18px}.dash-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:18px;margin-top:20px}.plan-big h2{font-size:52px;margin:10px 0}.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:18px 0}.stat-row>div{border:1px solid var(--line);border-radius:20px;padding:20px;background:rgba(255,255,255,.07)}.stat-row b{display:block;font-size:clamp(28px,5vw,46px);margin-top:8px}.stat-row span{color:var(--muted)}.green{background:linear-gradient(135deg,rgba(54,232,166,.22),rgba(255,255,255,.06))!important}.blue{background:linear-gradient(135deg,rgba(36,198,255,.22),rgba(255,255,255,.06))!important}.purple{background:linear-gradient(135deg,rgba(180,109,255,.22),rgba(255,255,255,.06))!important}.row{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin:10px 0;padding:15px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.06)}.status{font-size:12px;padding:6px 10px;border-radius:999px}.good{background:rgba(54,232,166,.18);color:#a7ffd9}.bad{background:rgba(255,107,138,.18);color:#ffc2cf}.wait{background:rgba(255,207,92,.18);color:#ffe6a5}.tabs{display:flex;gap:10px;overflow:auto;margin:18px 0;padding-bottom:6px}.method-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}.method-card{border:1px solid var(--line);border-radius:22px;overflow:hidden;background:rgba(255,255,255,.08);box-shadow:0 18px 50px rgba(0,0,0,.25)}.thumb{height:170px;display:grid;place-items:center;font-size:56px;background:linear-gradient(135deg,rgba(36,198,255,.18),rgba(109,93,252,.22))}.thumb img{width:100%;height:100%;object-fit:cover}.method-body{padding:18px}.method-top{display:flex;justify-content:space-between;gap:10px}.asset-row,.asset-links{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.asset-row span{font-size:12px;color:#dff8ff;border:1px solid var(--line);padding:7px 9px;border-radius:99px;background:rgba(36,198,255,.08)}input,textarea,select{width:100%;padding:14px;border-radius:12px;background:rgba(2,7,18,.65);border:1px solid var(--line);color:#fff;margin:8px 0}.payid{padding:14px;border:1px dashed rgba(125,249,255,.5);border-radius:14px;background:rgba(36,198,255,.08);word-break:break-all}.landingTop{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:18px 5%;background:rgba(3,8,23,.82);backdrop-filter:blur(20px);border-bottom:1px solid var(--line)}.hero{text-align:center;padding:78px 18px}.badge{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:10px 16px;background:rgba(54,232,166,.12);color:#b6ffe2;font-weight:900}.hero h1{font-size:clamp(36px,7vw,82px);line-height:1.05;margin:24px 0}.hero em{font-style:normal;background:linear-gradient(90deg,var(--green),var(--blue),#b46dff);-webkit-background-clip:text;color:transparent}.hero p{max-width:760px;margin:auto;color:var(--muted);font-size:20px;line-height:1.6}.heroActions{margin-top:25px;display:flex;justify-content:center;gap:12px;flex-wrap:wrap}.public,.content{max-width:1180px;margin:0 auto 28px}.content{padding:0 18px 40px}.community{text-decoration:none;color:white}.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;align-items:center;justify-content:center;padding:16px}.modal.show{display:flex}.box{max-width:560px;width:100%;max-height:90vh;overflow:auto;background:#071225;border:1px solid var(--line);border-radius:22px;padding:22px;box-shadow:var(--shadow)}.x{float:right}#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#071225;border:1px solid var(--line);padding:14px 18px;border-radius:12px;display:none;z-index:120}#toast.show{display:block}@media(max-width:860px){.app{display:block}.sidebar{position:fixed;transform:translateX(-105%);transition:.25s;width:82%;max-width:320px}.menu-open .sidebar{transform:translateX(0)}.main{padding:16px}.mobile-menu{display:block}.dash-grid,.stat-row{grid-template-columns:1fr}.landingTop{gap:12px;padding:14px}.landingTop .brand span{display:none}.landingTop button{padding:10px 12px}.public{margin:0 14px 24px}.grid,.method-grid{grid-template-columns:1fr}.hero{padding:54px 14px}.panel{padding:18px}.brand h1{font-size:18px}.brand img{width:48px;height:48px}}
</style></head><body><div id="app"></div><div id="modal" class="modal"><div class="box"><button class="x" onclick="closeModal()">×</button><div id="modalBody"></div></div></div><div id="toast"></div></body></html>
