import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';import{getFirestore,doc,setDoc,getDoc,addDoc,collection,onSnapshot,query,where,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",authDomain:"globexo-d9ade.firebaseapp.com",databaseURL:"https://globexo-d9ade-default-rtdb.firebaseio.com",projectId:"globexo-d9ade",storageBucket:"globexo-d9ade.firebasestorage.app",messagingSenderId:"1009453417317",appId:"1:1009453417317:web:32538a719df79d3c6ed78c",measurementId:"G-X0QPY3ML6M"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);let me=null,profile={},plans=[],methods=[],orders=[],earnings=[],coupons=[],links=[],settings={siteName:'GlobexoMart',paymentId:'Set by admin',referralPercent:20,vipChannelLink:''};const rank={Free:0,Basic:0,Standard:1,Plus:2,Pro:3};
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],money=n=>'$'+Number(n||0).toFixed(2);function toast(t){$('#toast').textContent=t;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),2300)}function code(){return profile.referralCode||('REF'+(me?.uid||'').slice(0,8).toUpperCase())}function refUrl(){return location.origin+location.pathname+'?ref='+code()}function ago(d){return Date.now()-d*864e5}function sum(ms){return earnings.filter(e=>(e.createdAt?.toMillis?.()||0)>=ms).reduce((a,b)=>a+Number(b.amount||0),0)}
function boot(){if(!me){$('#app').innerHTML=landing();setTimeout(()=>drawLandingChart(),60);return}let a=sum(ago(30)),b=sum(ago(365)),c=earnings.reduce((x,y)=>x+Number(y.amount||0),0);$('#app').innerHTML=`<button class="hamb" onclick="document.body.classList.toggle('menuOpen')">☰</button><aside class="side"><div class="brand"><img src="globexomart-learn-earn-icon.svg"><b>${settings.siteName||'GlobexoMart'}</b></div><nav class="nav"><button class="on" data-p="dash">🏠 Dashboard</button><button data-p="plans">💎 Plans</button><button data-p="methods">📚 Methods</button><button data-p="ref">💸 Referral</button><button data-p="community">🌐 Community</button><button data-p="vip">👑 VIP Channel</button><button data-p="support">💬 Support</button></nav><button class="danger" onclick="signOut(auth)">Logout</button></aside><main class="main"><section id="dash" class="page active">${dashboard(a,b,c)}</section><section id="plans" class="page">${plansHtml()}</section><section id="methods" class="page">${methodsHtml()}</section><section id="ref" class="page">${refHtml(a,b,c)}</section><section id="community" class="page">${communityHtml()}</section><section id="vip" class="page">${vipHtml()}</section><section id="support" class="page"><h1>Support</h1><div class="card glow"><h2>Need Help?</h2><p>Contact support through the community buttons added by admin. Keep your order TXID ready for faster checking.</p></div></section></main>`;$$('.nav button').forEach(x=>x.onclick=()=>{show(x.dataset.p);document.body.classList.remove('menuOpen')});setTimeout(()=>{drawEarnChart(a,b,c);filterMethods('All')},80)}
function show(p){$$('.page').forEach(x=>x.classList.remove('active'));$('#'+p).classList.add('active');$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.p==p))}
function landing(){let sample=methods.slice(0,8);if(!sample.length)sample=[{title:'Free Starter Method',thumbnail:'',levels:['Free'],description:'Open for everyone'},{title:'Standard Growth Method',thumbnail:'',levels:['Standard'],description:'Plan-based premium guide'},{title:'Plus Advanced Method',thumbnail:'',levels:['Plus'],description:'Advanced earning guide'},{title:'Pro Premium Method',thumbnail:'',levels:['Pro'],description:'Highest level strategy'}];return`<header class="top"><div class="brand"><img src="globexomart-learn-earn-icon.svg"><b>${settings.siteName||'GlobexoMart'}</b></div><div class="topBtns"><button onclick="authBox('login')">Login</button><button class="primary" onclick="authBox('signup')">Sign Up</button></div></header><section class="hero"><span class="pill">Premium Methods • Referral Earnings • VIP Access</span><h1>Unlock Premium Methods<br><em>& Grow Your Earnings</em></h1><p>Access practical methods, step-by-step guides, plan-based VIP access, referral rewards, and a professional community managed by ${settings.siteName||'GlobexoMart'}.</p><div><button class="primary" onclick="authBox('signup')">Create Account</button><button onclick="authBox('login')">Login to Account</button></div></section><section class="publicDash"><div class="card glow"><h2>Platform Growth Graph</h2><canvas id="landingChart" height="120"></canvas></div><div class="miniGrid"><div class="mini green">💎<b>Premium Guides</b><small>Organized by plan level</small></div><div class="mini blue">💸<b>Referral Reward</b><small>Earn when users upgrade</small></div><div class="mini violet">👑<b>VIP Access</b><small>Private channel for paid users</small></div></div></section><section class="content"><h2>Benefits of Joining</h2><div class="grid"><div class="card"><h3>Learn Faster</h3><p>Clear guides, thumbnails, and plan folders help users find useful methods quickly.</p></div><div class="card"><h3>Earn with Referrals</h3><p>Share your referral link and track 30 days, yearly, and total referral income.</p></div><div class="card"><h3>Upgrade Anytime</h3><p>Free users can preview method names and upgrade when they need locked access.</p></div></div><h2>Latest Methods</h2><div class="methodGrid">${sample.map(m=>methodCard(m,true)).join('')}</div></section>`}
function dashboard(a,b,c){return`<h1>Dashboard</h1><p class="muted">Welcome ${profile.name||''}. Track your plan, referral income, pending orders, and VIP access.</p><div class="heroCard"><div><small>Current Plan</small><h2>${profile.plan||'Basic'}</h2><p>${profile.planExpiry?'Expires: '+new Date(profile.planExpiry).toLocaleDateString():'Free access'}</p></div><div><button class="primary" onclick="show('plans')">Upgrade Plan</button></div></div><div class="card glow"><h2>Beautiful Earnings Graph</h2><canvas id="earnChart" height="150"></canvas></div><div class="earnGrid"><div class="earn green"><span>Last 30 Days</span><b>${money(a)}</b></div><div class="earn blue"><span>1 Year Earnings</span><b>${money(b)}</b></div><div class="earn violet"><span>Total Earnings</span><b>${money(c)}</b></div></div><div class="card"><h2>Referral Benefits</h2><p>Invite serious users to ${settings.siteName||'GlobexoMart'}. When they buy a plan and admin approves the payment, your referral earning is added to your dashboard automatically.</p></div><h2>Pending Orders</h2><div>${orders.length?orders.map(o=>`<div class="row"><b>${o.planName}</b><span class="tag ${o.status}">${o.status}</span><small>TXID: ${o.txid||'-'} • ${money(o.finalPrice||o.amount)}</small></div>`).join(''):'<p class="muted">No orders yet.</p>'}</div>`}
function plansHtml(){let list=plans.length?plans:[{id:'standard',name:'Standard',price:15,durationDays:30,features:['Standard methods','VIP channel','Referral earning']},{id:'plus',name:'Plus',price:30,durationDays:90,features:['Plus + Standard methods','VIP channel','Better learning access']},{id:'pro',name:'Pro',price:60,durationDays:180,features:['All methods','VIP channel','Best value']}];return`<h1>Plans</h1><div class="grid">${list.map(p=>`<div class="card plan"><h2>${p.name}</h2><h1>${money(p.price)}</h1><p>${p.durationDays||30} days access</p><ul>${(p.features||[]).map(f=>`<li>${f}</li>`).join('')}</ul><button class="primary" onclick="buyPlan('${p.id}')">Buy ${p.name}</button></div>`).join('')}</div>`}
function methodsHtml(){return`<h1>Methods</h1><p class="muted">All users can view method names and thumbnails. Locked methods open after buying the required plan.</p><div class="tabs">${['All','Free','Standard','Plus','Pro'].map(t=>`<button onclick="filterMethods('${t}')">${t} Methods</button>`).join('')}</div><div id="methodList" class="methodGrid"></div>`}
function methodCard(m,publicView=false){let lv=m.levels||['Free'],thumb=m.thumbnail||m.imageUrl||'';return`<div class="method card"><div class="thumb">${thumb?`<img src="${thumb}">`:'📚'}</div><div><h3>${m.title||'Untitled Method'} ${m.expired?'<span class="tag reject">Expired</span>':''}</h3><p>${m.description||'Premium earning method and guide.'}</p><small>${lv.join(' • ')}</small><button class="primary" onclick="${publicView?'authBox(\'signup\')':`openMethod('${m.id}')`}">${publicView?'Join to Open':'Open Method'}</button></div></div>`}
window.filterMethods=t=>{let list=methods.filter(m=>t=='All'||(m.levels||[]).includes(t));if(!list.length)list=[{title:'Free Starter Method',levels:['Free'],description:'Admin can add free methods here.'},{title:'Standard Method',levels:['Standard'],description:'Locked for Standard and above.'},{title:'Plus Method',levels:['Plus'],description:'Locked for Plus and above.'},{title:'Pro Method',levels:['Pro'],description:'Locked for Pro members.'}];$('#methodList').innerHTML=list.map(m=>methodCard(m)).join('')};
function refHtml(a,b,c){return`<h1>Referral</h1><div class="earnGrid"><div class="earn green"><span>30 Days</span><b>${money(a)}</b></div><div class="earn blue"><span>1 Year</span><b>${money(b)}</b></div><div class="earn violet"><span>Total</span><b>${money(c)}</b></div></div><div class="card"><h2>Your Referral Link</h2><input value="${refUrl()}" readonly><button class="primary" onclick="navigator.clipboard.writeText('${refUrl()}');toast('Referral link copied')">Copy Referral Link</button><p>Referral code is saved on signup. If a new user joins through your link, your code is filled automatically.</p></div>`}
function communityHtml(){let arr=links.length?links:[{name:'Public Channel',url:'#'},{name:'Proofs Channel',url:'#'},{name:'Support Chat',url:'#'}];return`<h1>Community</h1><p class="muted">Community buttons are managed by admin.</p><div class="grid">${arr.map(l=>`<a class="communityBtn" target="_blank" href="${l.url||'#'}"><b>${l.name||'Community'}</b><small>${l.description||settings.siteName||'GlobexoMart'}</small></a>`).join('')}</div>`}
function vipHtml(){let ok=rank[profile.plan||'Basic']>0;return`<h1>VIP Channel</h1><div class="card glow"><h2>${ok?'Your VIP Access':'Plan Required'}</h2><p>${ok?'This private channel link is only shown to Standard, Plus, and Pro users.':'Buy Standard, Plus, or Pro to unlock the VIP Telegram channel link.'}</p>${ok&&settings.vipChannelLink?`<a class="btn primary" target="_blank" href="${settings.vipChannelLink}">Open VIP Channel</a>`:'<button class="primary" onclick="show(\'plans\')">View Plans</button>'}</div>`}
window.buyPlan=id=>{let p=(plans.length?plans:[]).find(x=>x.id==id)||[{id:'standard',name:'Standard',price:15},{id:'plus',name:'Plus',price:30},{id:'pro',name:'Pro',price:60}].find(x=>x.id==id);modal(`<h2>Pay for ${p.name}</h2><p>Amount: <b>${money(p.price)}</b></p><p>Admin Payment ID: <b>${settings.paymentId||'Set by admin'}</b></p><input id="coupon" placeholder="Coupon code optional"><input id="txid" placeholder="Transaction ID"><textarea id="info" placeholder="Payment note / Telegram username / screenshot link"></textarea><button class="primary" onclick="submitOrder('${id}')">Submit Payment Request</button>`)}
window.submitOrder=async id=>{let p=(plans.length?plans:[]).find(x=>x.id==id)||{id,name:id,price:0},cp=$('#coupon').value.trim().toUpperCase(),disc=0;if(cp){let c=coupons.find(x=>x.code==cp&&x.active!==false);if(!c)return toast('Invalid coupon');disc=c.type=='percent'?p.price*Number(c.value||0)/100:Number(c.value||0)}await addDoc(collection(db,'orders'),{userId:me.uid,userEmail:me.email,userName:profile.name||'',planName:p.name,amount:p.price,discount:disc,finalPrice:Math.max(0,p.price-disc),coupon:cp,txid:$('#txid').value,info:$('#info').value,status:'pending',createdAt:serverTimestamp(),referralCode:profile.usedReferral||''});closeModal();toast('Order pending. Admin will approve after checking payment.')}
window.openMethod=id=>{let m=methods.find(x=>x.id==id),lv=m.levels||['Free'];if(m.expired)return toast('This method is expired');let ok=lv.includes('Free')||lv.some(l=>rank[profile.plan||'Basic']>=rank[l]);if(!ok){show('plans');return toast('Buy a plan to open this method')}modal(`<h2>${m.title}</h2><p>${m.content||m.description||''}</p>${m.link?`<a class="btn primary" target="_blank" href="${m.link}">Open Method Link</a>`:''}`)};
window.authBox=mode=>modal(`<h2>${mode=='login'?'Login':'Create Account'}</h2>${mode=='signup'?'<input id="name" placeholder="Full Name">':''}<input id="email" placeholder="Gmail / Email"><input id="pass" type="password" placeholder="Password">${mode=='signup'?'<input id="pass2" type="password" placeholder="Confirm Password"><input id="ref" placeholder="Referral Code Optional" value="'+(new URLSearchParams(location.search).get('ref')||'')+'">':''}<button class="primary" onclick="authGo('${mode}')">${mode=='login'?'Login':'Create Account'}</button>`)
window.authGo=async mode=>{try{let email=$('#email').value.trim(),pass=$('#pass').value;if(mode=='signup'){if(pass!==$('#pass2').value)return toast('Passwords do not match');let cr=await createUserWithEmailAndPassword(auth,email,pass);await setDoc(doc(db,'users',cr.user.uid),{name:$('#name').value,email,plan:'Basic',referralCode:'REF'+cr.user.uid.slice(0,8).toUpperCase(),usedReferral:$('#ref').value.trim().toUpperCase(),createdAt:serverTimestamp()})}else await signInWithEmailAndPassword(auth,email,pass);closeModal()}catch(e){toast(e.message)}};
function drawEarnChart(a,b,c){let cv=$('#earnChart');if(!cv)return;let x=cv.getContext('2d'),w=cv.width=cv.offsetWidth,h=cv.height=180,vals=[a,b,c],max=Math.max(...vals,1);x.clearRect(0,0,w,h);vals.forEach((v,i)=>{let bw=w/5,bh=(v/max)*(h-48),left=55+i*bw*1.35,gr=x.createLinearGradient(0,h-bh,0,h);gr.addColorStop(0,['#55e6ac','#58b7ff','#a78bfa'][i]);gr.addColorStop(1,['#0ea66d','#2563eb','#7c3aed'][i]);x.fillStyle=gr;x.roundRect(left,h-bh-28,bw,bh,14);x.fill();x.fillStyle='#dbeafe';x.font='13px Arial';x.fillText(['30D','1Y','Total'][i],left+8,h-6)})}
function drawLandingChart(){let cv=$('#landingChart');if(!cv)return;let x=cv.getContext('2d'),w=cv.width=cv.offsetWidth,h=cv.height=150;x.clearRect(0,0,w,h);let pts=[0.1,0.25,0.2,0.45,0.6,0.52,0.8,0.95];x.strokeStyle='#55e6ac';x.lineWidth=5;x.beginPath();pts.forEach((p,i)=>{let px=i*(w/(pts.length-1)),py=h-p*(h-25)-10;i?x.lineTo(px,py):x.moveTo(px,py)});x.stroke();x.strokeStyle='#58b7ff';x.lineWidth=2;x.strokeRect(8,8,w-16,h-16)}
function modal(h){$('#modalBody').innerHTML=h;$('#modal').classList.add('show')}window.closeModal=()=>$('#modal').classList.remove('show');
onAuthStateChanged(auth,u=>{me=u;if(!u){boot();return}onSnapshot(doc(db,'users',u.uid),s=>{profile=s.data()||{};boot()});onSnapshot(query(collection(db,'orders'),where('userId','==',u.uid)),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()}));boot()});onSnapshot(query(collection(db,'referralEarnings'),where('userId','==',u.uid)),s=>{earnings=s.docs.map(d=>d.data());boot()})});
onSnapshot(collection(db,'plans'),s=>{plans=s.docs.map(d=>({id:d.id,...d.data()}));boot()});onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));boot()});onSnapshot(collection(db,'coupons'),s=>coupons=s.docs.map(d=>({id:d.id,...d.data()})));onSnapshot(collection(db,'communityLinks'),s=>{links=s.docs.map(d=>({id:d.id,...d.data()}));boot()});onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};boot()});
</script><style>

ckground:#0b192b;border:1px solid #29466c;border-radius:24px;padding:24px}.x{float:right}#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#0e253d;border:1px solid #315b89;padding:14px 18px;border-radius:14px;display:none;z-index:100}#toast.show{display:block}@media(max-width:850px){.hamb{display:block}.side{transform:translateX(-105%);transition:.25s;width:82%;max-width:320px}.menuOpen .side{transform:translateX(0)}.main{margin:0;padding:72px 16px 24px}.top{padding-left:50px}.brand{font-size:20px}.brand img{width:46px}.hero{padding:48px 14px}.hero button,.topBtns button{padding:11px 13px}.miniGrid,.earnGrid{grid-template-columns:1fr}.heroCard{display:block}.methodGrid,.grid{grid-template-columns:1fr}.card,.mini,.communityBtn{padding:18px}.earn b{font-size:34px}.nav button{text-align:left}.publicDash,.content{padding:24px 16px}}@media(min-width:851px){.top{display:none}}
</style></head><body><div id="app"></div><div id="modal" class="modal"><div class="box"><button class="x" onclick="closeModal()">×</button><div id="modalBody"></div></div></div><div id="toast"></div></body></html>
