<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GlobexoMart Admin Panel</title><style>
:root{--bg:#08111f;--panel:#0e1b30;--card:#12243f;--line:#243856;--text:#eef6ff;--muted:#9fb2cc;--brand:#55e6a5;--brand2:#58a6ff;--warn:#ffcc66;--bad:#ff6b7a;--good:#55e6a5;--shadow:0 20px 60px rgba(0,0,0,.35);--radius:22px}
*{box-sizing:border-box}html{width:100%;overflow-x:hidden}body{margin:0;width:100%;overflow-x:hidden;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#153b69 0,#08111f 40%,#050914 100%);color:var(--text)}
a{color:inherit;text-decoration:none}.app{min-height:100vh;width:100%}.hidden{display:none!important}.center{text-align:center}.muted{color:var(--muted);line-height:1.65}.gradientText{background:linear-gradient(135deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent}
.top{position:sticky;top:0;z-index:9;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px clamp(16px,4vw,44px);background:rgba(8,17,31,.86);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.brand{display:flex;gap:12px;align-items:center;font-weight:900;letter-spacing:.2px;min-width:0}.brand img{width:48px;height:48px;flex:0 0 auto}.brand span{font-size:clamp(21px,3vw,28px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.nav{display:flex;align-items:center;justify-content:flex-end;gap:10px;flex-wrap:wrap;min-width:0}.nav button,.btn{border:0;border-radius:16px;padding:12px 17px;background:#172941;color:var(--text);font-weight:850;cursor:pointer;font-size:15px;line-height:1.1;min-height:44px}.nav button.active,.btn.primary,.nav button.primary{background:linear-gradient(135deg,var(--brand),var(--brand2));color:#04101d}.btn.good{background:rgba(85,230,165,.15);color:var(--good);border:1px solid rgba(85,230,165,.35)}.btn.bad{background:rgba(255,107,122,.15);color:var(--bad);border:1px solid rgba(255,107,122,.35)}.btn.warn{background:rgba(255,204,102,.15);color:var(--warn);border:1px solid rgba(255,204,102,.35)}
.hero{padding:54px 24px 24px;max-width:1180px;margin:auto;display:grid;grid-template-columns:1.15fr .85fr;gap:24px;align-items:center}.hero.public{display:block;text-align:center;max-width:1120px;padding:64px 18px 28px}.hero h1{font-size:clamp(34px,6vw,76px);line-height:1.05;margin:0 0 18px;letter-spacing:-1.6px}.hero p{font-size:clamp(16px,2.3vw,22px)}.heroActions{display:flex;gap:18px;justify-content:center;flex-wrap:wrap;margin:28px 0}.heroActions .btn{min-width:210px}.heroCard,.card{background:linear-gradient(180deg,rgba(18,36,63,.94),rgba(12,24,43,.94));border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:clamp(18px,3vw,24px);min-width:0}.wrap{max-width:1180px;margin:auto;padding:22px 24px 60px;width:100%}.grid{display:grid;gap:18px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.four{grid-template-columns:repeat(4,minmax(0,1fr))}.card h2,.card h3{margin-top:0}.badge{display:inline-flex;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;background:#1f3655;color:#b9d7ff}.badge.good{background:rgba(85,230,165,.14);color:var(--good)}.badge.warn{background:rgba(255,204,102,.15);color:var(--warn)}.badge.bad{background:rgba(255,107,122,.15);color:var(--bad)}.price{font-size:clamp(28px,5vw,38px);font-weight:950;margin:12px 0;line-height:1}.field{display:grid;gap:7px;margin:10px 0}.field label{font-size:13px;color:var(--muted);font-weight:850}input,select,textarea{width:100%;border:1px solid var(--line);background:#071225;color:var(--text);border-radius:14px;padding:13px;font:inherit}textarea{min-height:96px}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03);margin:10px 0;min-width:0}.row span{word-break:break-word}.modal{position:fixed;inset:0;background:rgba(0,0,0,.68);display:flex;align-items:center;justify-content:center;padding:18px;z-index:20}.modalBox{width:min(560px,100%);max-height:90vh;overflow:auto}.toast{position:fixed;right:18px;bottom:18px;background:#0f2037;border:1px solid var(--line);border-radius:16px;padding:14px 18px;box-shadow:var(--shadow);z-index:30}.methodImg{height:150px;border-radius:16px;background:#0b1628;object-fit:cover;width:100%;border:1px solid var(--line)}.footer{border-top:1px solid var(--line);padding:24px;color:var(--muted);text-align:center}.landingOnly,.memberOnly{display:block}.authBtns{display:flex;gap:12px}.statIcon{font-size:34px}.steps{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:20px;align-items:center}.arrow{font-size:34px;color:var(--muted)}.success{min-height:190px}.shine{position:relative;overflow:hidden}.shine:before{content:"";position:absolute;inset:-80px;background:radial-gradient(circle at 30% 20%,rgba(85,230,165,.16),transparent 32%),radial-gradient(circle at 80% 15%,rgba(88,166,255,.15),transparent 35%);pointer-events:none}.shine>*{position:relative}.vipBox{border-color:rgba(85,230,165,.45);background:linear-gradient(180deg,rgba(85,230,165,.08),rgba(88,166,255,.05))}.dashActions{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.dashBtn{display:block;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.04);padding:18px;min-height:110px;transition:.2s}.dashBtn:hover{transform:translateY(-2px);border-color:rgba(85,230,165,.45)}.dashBtn b{display:block;font-size:18px;margin-bottom:8px}.dashBtn small{color:var(--muted);line-height:1.4}.tableWrap{width:100%;overflow-x:auto}.tableWrap table{width:100%;min-width:780px;border-collapse:collapse}.tableWrap th,.tableWrap td{padding:12px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top}
@media(max-width:960px){.hero{grid-template-columns:1fr}.three,.four,.dashActions{grid-template-columns:repeat(2,minmax(0,1fr))}.steps{grid-template-columns:1fr}.arrow{display:none}.top{align-items:flex-start}.nav{justify-content:flex-start}}
@media(max-width:640px){body{background:radial-gradient(circle at top,#12355f 0,#08111f 38%,#050914 100%)}.top{position:relative;padding:14px 14px 16px;gap:12px;align-items:stretch;flex-direction:column}.brand{justify-content:center;width:100%}.brand img{width:44px;height:44px}.brand span{font-size:24px}.nav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));width:100%;gap:10px}.nav button,.btn{width:100%;padding:12px 10px;border-radius:16px;font-size:15px}.top>.btn.bad{width:100%;max-width:none}body:not(.loggedIn) .publicTop{flex-direction:row;align-items:center}body:not(.loggedIn) .publicTop .nav{display:flex;width:auto;grid-template-columns:none}.hero.public{padding:40px 14px 18px;text-align:center}.hero.public h1{font-size:clamp(34px,10vw,48px);letter-spacing:-.8px}.hero.public p{font-size:17px}.heroActions{display:grid;grid-template-columns:1fr;gap:12px;margin:24px auto;max-width:340px}.heroActions .btn{min-width:0}.wrap{padding:16px 14px 44px}.two,.three,.four,.dashActions{grid-template-columns:1fr}.grid.four.center{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid.four.center .card{padding:16px 10px;border-radius:18px}.grid.four.center .price{font-size:30px}.grid.four.center .muted{font-size:14px;line-height:1.35}.card{border-radius:20px;padding:18px}.row{align-items:flex-start;flex-direction:column}.modal{align-items:flex-end;padding:10px}.modalBox{border-radius:20px 20px 0 0}.footer{font-size:14px}.methodImg{height:135px}}
@media(max-width:380px){.grid.four.center{grid-template-columns:1fr}.brand span{font-size:21px}.hero.public h1{font-size:32px}.nav button,.btn{font-size:14px}.price{font-size:28px}}

</style></head><body><div class="app"><header class="top"><div class="brand"><img src="globexomart-learn-earn-icon.svg" onerror="this.style.display='none'"><span>GlobexoMart Admin</span></div><nav class="nav" id="nav"></nav><button class="btn bad hidden" id="logoutBtn">Logout</button></header><main class="wrap"><section id="view"></section></main><footer class="footer">Admin panel: plans, methods, community links, VIP channel, payment approvals, and referrals.</footer></div><div class="modal hidden" id="modal"><div class="card modalBox"><div id="modalBody"></div><button class="btn bad" onclick="closeModal()">Close</button></div></div><div id="toast" class="toast hidden"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection, getDocs, onSnapshot, serverTimestamp, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",
  authDomain: "globexo-d9ade.firebaseapp.com",
  databaseURL: "https://globexo-d9ade-default-rtdb.firebaseio.com",
  projectId: "globexo-d9ade",
  storageBucket: "globexo-d9ade.firebasestorage.app",
  messagingSenderId: "1009453417317",
  appId: "1:1009453417317:web:32538a719df79d3c6ed78c",
  measurementId: "G-X0QPY3ML6M"
};

const OWNER_EMAIL='elzinhemil09@gmail.com'; const app=initializeApp(firebaseConfig), auth=getAuth(app), db=getFirestore(app); const $=s=>document.querySelector(s); let admin=null, paymentRequests=[], users=[], methods=[], plans=[], links=[];
const defaultPlans=[{name:'Basic',price:0,durationDays:0,features:['Free methods','Referral link','Community access']},{name:'Standard',price:15,durationDays:30,features:['Standard methods','20% referral reward','Support']},{name:'Plus',price:30,durationDays:90,features:['Plus methods','Priority support','Better earning guides']},{name:'Pro',price:60,durationDays:180,features:['All methods','Private community','Early updates']}];
function toast(t){$('#toast').textContent=t;$('#toast').classList.remove('hidden');setTimeout(()=>$('#toast').classList.add('hidden'),2600)}
function closeModal(){$('#modal').classList.add('hidden')} window.closeModal=closeModal; function openModal(h){$('#modalBody').innerHTML=h;$('#modal').classList.remove('hidden')}
function loginView(){$('#nav').innerHTML=''; $('#view').innerHTML=`<div class="heroCard"><h1>Admin Login</h1><p class="muted">Login with your Firebase admin email. First owner email allowed: ${OWNER_EMAIL}</p><div class="field"><label>Email</label><input id="email" type="email"></div><div class="field"><label>Password</label><input id="pass" type="password"></div><button class="btn primary" onclick="adminLogin()">Login</button></div>`}
async function adminLogin(){await signInWithEmailAndPassword(auth,$('#email').value.trim(),$('#pass').value)} window.adminLogin=adminLogin; $('#logoutBtn').onclick=()=>signOut(auth);
async function isAdmin(u){if(u.email===OWNER_EMAIL)return true; let a=await getDoc(doc(db,'admins',u.uid)); if(a.exists())return true; let p=await getDoc(doc(db,'users',u.uid)); return p.exists()&&p.data().role==='admin'}
const tabs=[['dashboard','Dashboard'],['requests','Payments'],['plans','Plans'],['methods','Methods'],['community','Community'],['users','Users'],['settings','Settings']];
function nav(){$('#nav').innerHTML=tabs.map(t=>`<button onclick="route('${t[0]}')" id="tab-${t[0]}">${t[1]}</button>`).join('')} function active(x){document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));$('#tab-'+x)?.classList.add('active')}
async function loadAll(){paymentRequests=(await getDocs(query(collection(db,'paymentRequests'),orderBy('createdAt','desc')))).docs.map(d=>({id:d.id,...d.data()})); users=(await getDocs(collection(db,'users'))).docs.map(d=>({id:d.id,...d.data()})); methods=(await getDocs(collection(db,'methods'))).docs.map(d=>({id:d.id,...d.data()})); let p=(await getDocs(collection(db,'plans'))); plans=p.empty?defaultPlans:p.docs.map(d=>({id:d.id,...d.data()})); links=(await getDocs(collection(db,'communityLinks'))).docs.map(d=>({id:d.id,...d.data()}));}
function route(x='dashboard'){active(x); if(x==='dashboard')dash(); if(x==='requests')requestsView(); if(x==='plans')plansView(); if(x==='methods')methodsView(); if(x==='community')linksView(); if(x==='users')usersView(); if(x==='settings')settingsView();} window.route=route;
function dash(){$('#view').innerHTML=`<div class="grid four"><div class="card"><span class="badge warn">Pending Payments</span><div class="price">${paymentRequests.filter(r=>r.status==='Pending').length}</div></div><div class="card"><span class="badge good">Users</span><div class="price">${users.length}</div></div><div class="card"><span class="badge good">Methods</span><div class="price">${methods.length}</div></div><div class="card"><span class="badge good">Community Links</span><div class="price">${links.length}</div></div></div><br><div class="card"><h2>Current build</h2><p class="muted">Use manual plan/method unlock requests, referral payouts after approval, admin payment ID, and VIP community links.</p></div>`}
function table(cols,rows,acts=''){return `<div class="tableWrap"><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}<th>Actions</th></tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c]??''}</td>`).join('')}<td>${acts(r)}</td></tr>`).join('')}</tbody></table></div>`}
function requestsView(){let rows=paymentRequests.map(r=>({ID:r.id,Email:r.email,Contact:r.contact||'',Type:r.type,Item:r.item,Amount:'$'+r.amount,TXID:r.txid,Status:r.status})); $('#view').innerHTML=`<div class="card"><h2>Payment Requests</h2><p class="muted">Approve only after checking payment manually. Approval activates plan/method unlock and creates referral commission record.</p>${table(['ID','Email','Contact','Type','Item','Amount','TXID','Status'],rows,r=>r.Status==='Pending'?`<button class="btn good" onclick="approveReq('${r.ID}')">Approve</button> <button class="btn bad" onclick="rejectReq('${r.ID}')">Reject</button>`:'')}</div>`}
async function approveReq(id){let r=paymentRequests.find(x=>x.id===id); if(!r)return; await updateDoc(doc(db,'paymentRequests',id),{status:'Approved',approvedAt:serverTimestamp(),approvedBy:admin.uid}); if(r.type==='plan'||r.type==='method_unlock'){let u=users.find(x=>x.id===r.uid); await updateDoc(doc(db,'users',r.uid),{plan:r.item,planApprovedAt:serverTimestamp()}); if(r.referredBy) await addDoc(collection(db,'referralRewards'),{referrerCode:r.referredBy,referredUid:r.uid,referredEmail:r.email,plan:r.item,amount:r.amount,commission:Math.round((Number(r.amount)*0.20)*100)/100,status:'Approved',paymentRequestId:id,createdAt:serverTimestamp()})} await loadAll(); route('requests'); toast('Approved')} window.approveReq=approveReq;
async function rejectReq(id){await updateDoc(doc(db,'paymentRequests',id),{status:'Rejected',rejectedAt:serverTimestamp(),rejectedBy:admin.uid}); await loadAll(); route('requests'); toast('Rejected')} window.rejectReq=rejectReq;
function plansView(){$('#view').innerHTML=`<div class="card"><div class="row"><h2>Plans</h2><button class="btn primary" onclick="seedPlans()">Save Default Plans</button></div>${table(['name','price','durationDays'],plans,p=>`<button class="btn" onclick="editPlan('${p.name}')">Edit</button>`)}</div>`}
async function seedPlans(){for(const p of defaultPlans) await setDoc(doc(db,'plans',p.name),p); await loadAll(); route('plans'); toast('Default plans saved')} window.seedPlans=seedPlans;
function editPlan(name){let p=plans.find(x=>x.name===name); openModal(`<h2>Edit Plan</h2><div class="field"><label>Name</label><input id="pn" value="${p.name}"></div><div class="field"><label>Price USD</label><input id="pp" type="number" value="${p.price||0}"></div><div class="field"><label>Duration Days</label><input id="pd" type="number" value="${p.durationDays||0}"></div><div class="field"><label>Features comma separated</label><textarea id="pf">${(p.features||[]).join(',')}</textarea></div><button class="btn primary" onclick="savePlan('${name}')">Save</button>`)} window.editPlan=editPlan;
async function savePlan(old){let p={name:$('#pn').value,price:Number($('#pp').value),durationDays:Number($('#pd').value),features:$('#pf').value.split(',').map(x=>x.trim()).filter(Boolean)}; await setDoc(doc(db,'plans',p.name),p); closeModal(); await loadAll(); route('plans')} window.savePlan=savePlan;
function methodsView(){$('#view').innerHTML=`<div class="card"><div class="row"><h2>Methods</h2><button class="btn primary" onclick="editMethod('')">Add Method</button></div>${table(['title','requiredPlan','status'],methods,m=>`<button class="btn" onclick="editMethod('${m.id}')">Edit</button>`)}</div>`}
function editMethod(id){let m=methods.find(x=>x.id===id)||{title:'',description:'',thumbnailUrl:'',requiredPlan:'Standard',status:'Published',resources:[{title:'Open Link',url:'https://example.com'}]}; openModal(`<h2>${id?'Edit':'Add'} Method</h2><div class="field"><label>Title</label><input id="mt" value="${m.title}"></div><div class="field"><label>Description</label><textarea id="md">${m.description||''}</textarea></div><div class="field"><label>Thumbnail URL</label><input id="mi" value="${m.thumbnailUrl||''}"></div><div class="field"><label>Required Plan</label><select id="mp">${['Basic','Standard','Plus','Pro'].map(p=>`<option ${m.requiredPlan===p?'selected':''}>${p}</option>`).join('')}</select></div><div class="field"><label>Status</label><select id="ms"><option>Published</option><option>Draft</option></select></div><div class="field"><label>Resources JSON</label><textarea id="mr">${JSON.stringify(m.resources||[],null,2)}</textarea></div><button class="btn primary" onclick="saveMethod('${id}')">Save</button>`)} window.editMethod=editMethod;
async function saveMethod(id){let resources=[]; try{resources=JSON.parse($('#mr').value)}catch(e){return toast('Resources JSON invalid')} let data={title:$('#mt').value,description:$('#md').value,thumbnailUrl:$('#mi').value,requiredPlan:$('#mp').value,status:$('#ms').value,resources,updatedAt:serverTimestamp()}; if(id) await setDoc(doc(db,'methods',id),data,{merge:true}); else await addDoc(collection(db,'methods'),data); closeModal(); await loadAll(); route('methods')} window.saveMethod=saveMethod;
function linksView(){$('#view').innerHTML=`<div class="card"><div class="row"><h2>Community Links</h2><button class="btn primary" onclick="editLink('')">Add Link</button></div>${table(['title','type','url','active'],links,l=>`<button class="btn" onclick="editLink('${l.id}')">Edit</button>`)}</div>`}
function editLink(id){let l=links.find(x=>x.id===id)||{title:'Telegram Channel',type:'Telegram',url:'https://t.me/',description:'Join community',active:true}; openModal(`<h2>${id?'Edit':'Add'} Community Link</h2><div class="field"><label>Title</label><input id="lt" value="${l.title}"></div><div class="field"><label>Type</label><input id="ly" value="${l.type}"></div><div class="field"><label>URL</label><input id="lu" value="${l.url}"></div><div class="field"><label>Description</label><textarea id="ld">${l.description||''}</textarea></div><div class="field"><label>Active</label><select id="la"><option value="true">true</option><option value="false">false</option></select></div><button class="btn primary" onclick="saveLink('${id}')">Save</button>`)} window.editLink=editLink;
async function saveLink(id){let data={title:$('#lt').value,type:$('#ly').value,url:$('#lu').value,description:$('#ld').value,active:$('#la').value==='true',updatedAt:serverTimestamp()}; if(id) await setDoc(doc(db,'communityLinks',id),data,{merge:true}); else await addDoc(collection(db,'communityLinks'),data); closeModal(); await loadAll(); route('community')} window.saveLink=saveLink;
function usersView(){$('#view').innerHTML=`<div class="card"><h2>Users</h2>${table(['id','name','email','plan','referralCode','referredBy'],users,u=>`<button class="btn warn" onclick="makeAdmin('${u.id}')">Make Admin</button>`)}</div>`}
async function makeAdmin(id){await setDoc(doc(db,'admins',id),{uid:id,createdAt:serverTimestamp(),createdBy:admin.uid}); await updateDoc(doc(db,'users',id),{role:'admin'}); toast('Admin added')} window.makeAdmin=makeAdmin;
function settingsView(){$('#view').innerHTML=`<div class="card"><h2>Payment & Referral Settings</h2><div class="field"><label>Payment Name</label><input id="payName" placeholder="Binance UID / USDT Address"></div><div class="field"><label>Admin Payment ID</label><input id="payId" placeholder="Your payment ID/address shown to users"></div><div class="field"><label>Payment Instructions</label><textarea id="payIns">Pay exact amount and paste TXID.</textarea></div><div class="field"><label>Referral Percent</label><input id="refP" type="number" value="20"></div><div class="field"><label>VIP Telegram Channel Link</label><input id="vipLink" placeholder="https://t.me/+privateInvite"></div><button class="btn primary" onclick="saveSettings()">Save Settings</button></div>`; loadSettingsForm()}
async function loadSettingsForm(){let s=await getDoc(doc(db,'settings','main')); if(s.exists()){let d=s.data(); $('#payName').value=d.paymentName||''; $('#payId').value=d.paymentId||''; $('#payIns').value=d.paymentInstructions||''; $('#refP').value=d.referralPercent||20; $('#vipLink').value=d.vipChannelLink||'';}}
async function saveSettings(){await setDoc(doc(db,'settings','main'),{paymentName:$('#payName').value,paymentId:$('#payId').value,paymentInstructions:$('#payIns').value,referralPercent:Number($('#refP').value),vipChannelLink:$('#vipLink').value,updatedAt:serverTimestamp()},{merge:true}); toast('Settings saved')} window.saveSettings=saveSettings;
onAuthStateChanged(auth,async u=>{admin=u; $('#logoutBtn').classList.toggle('hidden',!u); if(!u)return loginView(); if(!(await isAdmin(u))){$('#view').innerHTML='<div class="card"><h2>Access denied</h2><p class="muted">Add this UID/email as admin in Firestore.</p></div>';return} nav(); await loadAll(); route('dashboard')});
</script></body></html>
