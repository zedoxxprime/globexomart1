<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GlobexoMart</title>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';import{getFirestore,doc,setDoc,getDoc,addDoc,collection,onSnapshot,query,where,serverTimestamp,updateDoc}from'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';
const firebaseConfig={apiKey:"AIzaSyC7SjMgzuH7stBaTP-jqkHfXDLmnNJV0X8",authDomain:"globexo-d9ade.firebaseapp.com",databaseURL:"https://globexo-d9ade-default-rtdb.firebaseio.com",projectId:"globexo-d9ade",storageBucket:"globexo-d9ade.firebasestorage.app",messagingSenderId:"1009453417317",appId:"1:1009453417317:web:32538a719df79d3c6ed78c",measurementId:"G-X0QPY3ML6M"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);let me=null,profile={},plans=[],methods=[],orders=[],earnings=[],coupons=[],settings={paymentId:'Set by admin',referralPercent:20,vipChannelLink:''};const rank={Free:0,Basic:0,Standard:1,Plus:2,Pro:3};
const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)];function toast(x){$('#toast').textContent=x;$('#toast').classList.add('show');setTimeout(()=>$('#toast').classList.remove('show'),2500)}function show(id){$$('.page').forEach(p=>p.classList.remove('active'));$('#'+id).classList.add('active');$$('.nav button').forEach(b=>b.classList.toggle('on',b.dataset.page==id));}
function money(n){return '$'+(Number(n||0)).toFixed(2)}function code(){return 'REF'+(me?.uid||'').slice(0,8).toUpperCase()}function refUrl(){return location.origin+location.pathname+'?ref='+code()}function daysAgo(d){return Date.now()-d*864e5}
function sumSince(ms){return earnings.filter(e=>(e.createdAt?.toMillis?.()||0)>=ms).reduce((a,b)=>a+Number(b.amount||0),0)}
function redraw(){if(!me){$('#app').innerHTML=landing();return}let last30=sumSince(daysAgo(30)),year=sumSince(daysAgo(365)),total=earnings.reduce((a,b)=>a+Number(b.amount||0),0);$('#app').innerHTML=`<aside class="side"><div class="brand"><img src="globexomart-learn-earn-icon.svg"><b>GlobexoMart</b></div><nav class="nav"><button class="on" data-page="dash">Dashboard</button><button data-page="plans">Plans</button><button data-page="methods">Methods</button><button data-page="ref">Referral</button><button data-page="community">Community</button><button data-page="support">Support</button></nav><button class="danger" id="logout">Logout</button></aside><main class="main"><section id="dash" class="page active">${dash(last30,year,total)}</section><section id="plans" class="page">${plansHtml()}</section><section id="methods" class="page">${methodsHtml()}</section><section id="ref" class="page">${refHtml(last30,year,total)}</section><section id="community" class="page">${communityHtml()}</section><section id="support" class="page"><h1>Support</h1><div class="card">Need help? Contact admin from your community link or payment support. Keep your TXID ready.</div></section></main>`;$$('.nav button').forEach(b=>b.onclick=()=>show(b.dataset.page));$('#logout').onclick=()=>signOut(auth);drawChart(total,last30,year);}
function landing(){return`<header class="top"><div class="brand"><img src="globexomart-learn-earn-icon.svg"><b>GlobexoMart</b></div><div><button onclick="openAuth('login')">Login</button><button class="primary" onclick="openAuth('signup')">Sign Up</button></div></header><section class="hero"><span>Premium Methods • Real Earnings</span><h1>Unlock Premium Methods<br><em>& Grow Your Earnings</em></h1><p>Access high-quality earning methods, step-by-step guides, referral rewards, and private plan community access.</p><button class="primary" onclick="openAuth('signup')">Create Account</button><button onclick="openAuth('login')">Login to Account</button></section><section class="grid stats"><div>👥<b>500+</b><p>Growing Members</p></div><div>📈<b>100+</b><p>Methods & Guides</p></div><div>💰<b>20%</b><p>Referral Reward</p></div><div>✅<b>VIP</b><p>Private Access</p></div></section>`}
function dash(a,b,c){let pending=orders.filter(o=>o.status=='pending').length;return`<h1>Dashboard</h1><p class="muted">Welcome ${profile.name||''}. Track your plan, referral income, orders, and premium access.</p><div class="grid"><div class="card big"><small>Current Plan</small><h2>${profile.plan||'Basic'}</h2><p>${profile.planExpiry?'Expires: '+new Date(profile.planExpiry).toLocaleDateString():'Free access'}</p></div><div class="card"><small>Last 30 Days</small><h2>${money(a)}</h2></div><div class="card"><small>1 Year Earnings</small><h2>${money(b)}</h2></div><div class="card"><small>Total Earnings</small><h2>${money(c)}</h2></div></div><div class="card"><h2>Referral Earnings Graph</h2><canvas id="chart" height="110"></canvas></div><h2>Pending Orders</h2><div class="list">${orders.length?orders.map(o=>`<div class="row"><b>${o.planName}</b><span class="tag ${o.status}">${o.status}</span><small>TXID: ${o.txid||'-'} • ${money(o.finalPrice||o.amount)}</small></div>`).join(''):'<p class="muted">No orders yet.</p>'}</div>`}
function plansHtml(){return`<h1>Choose Plan</h1><div class="grid">${plans.map(p=>`<div class="card"><h2>${p.name}</h2><h1>${money(p.price)}</h1><p>${p.durationDays||30} days access</p><ul>${(p.features||[]).map(f=>`<li>${f}</li>`).join('')}</ul><button class="primary" onclick="buyPlan('${p.id}')">Buy ${p.name}</button></div>`).join('')}</div>`}
function methodsHtml(){let tabs=['All','Free','Standard','Plus','Pro'];return`<h1>Methods Folder</h1><div class="tabs">${tabs.map(t=>`<button onclick="filterMethods('${t}')">${t} Methods</button>`).join('')}</div><div id="methodList" class="grid"></div>`}
window.filterMethods=t=>{let list=methods.filter(m=>t=='All'||(m.levels||[]).includes(t));$('#methodList').innerHTML=list.map(m=>`<div class="card"><h2>${m.title} ${m.expired?'<span class="tag reject">Expired</span>':''}</h2><p>${m.description||''}</p><small>Access: ${(m.levels||[]).join(', ')}</small><button class="primary" onclick="openMethod('${m.id}')">Open Method</button></div>`).join('')||'<p class="muted">No methods here.</p>'};
function refHtml(a,b,c){return`<h1>Referral Center</h1><div class="grid"><div class="card"><small>Last 30 Days</small><h2>${money(a)}</h2></div><div class="card"><small>1 Year</small><h2>${money(b)}</h2></div><div class="card"><small>Total</small><h2>${money(c)}</h2></div></div><div class="card"><h2>Your Referral Code</h2><input value="${code()}" readonly><button onclick="navigator.clipboard.writeText('${refUrl()}');toast('Referral link copied')">Copy Link</button><p class="muted">Invite members. When your referral buys a plan and admin approves, your earnings are added automatically. This helps you grow long-term income while sharing useful premium methods.</p></div>`}
function communityHtml(){return`<h1>Community</h1><div class="grid"><div class="card"><h2>VIP Channel</h2><p>Approved plan members can access the private Telegram channel shared by admin.</p><button class="primary" onclick="openVip()">Open VIP Link</button></div></div>`}
function drawChart(t,a,b){setTimeout(()=>{let c=$('#chart');if(!c)return;let x=c.getContext('2d'),w=c.width=c.offsetWidth,h=c.height=130,vals=[a,b,t],max=Math.max(...vals,1);x.clearRect(0,0,w,h);vals.forEach((v,i)=>{let bw=w/5,bh=(v/max)*(h-30);x.fillStyle=i==0?'#55e6ac':i==1?'#59b7ff':'#8b5cf6';x.fillRect(50+i*bw*1.4,h-bh-15,bw,bh);x.fillStyle='#c7d2fe';x.fillText(['30D','1Y','Total'][i],55+i*bw*1.4,h-2)})},50)}
window.buyPlan=id=>{let p=plans.find(x=>x.id==id);openModal(`<h2>Pay for ${p.name}</h2><p>Amount: <b>${money(p.price)}</b></p><p>Admin Payment ID: <b>${settings.paymentId||'Set by admin'}</b></p><input id="coupon" placeholder="Coupon code optional"><input id="txid" placeholder="Transaction ID"><textarea id="info" placeholder="Your payment note / username / screenshot link optional"></textarea><button class="primary" onclick="submitOrder('${id}')">Submit Payment Request</button>`)};
window.submitOrder=async id=>{let p=plans.find(x=>x.id==id),cp=$('#coupon').value.trim().toUpperCase(),discount=0;if(cp){let c=coupons.find(x=>x.code==cp&&x.active!==false);if(c){discount=c.type=='percent'?p.price*Number(c.value||0)/100:Number(c.value||0)}else return toast('Invalid coupon')}await addDoc(collection(db,'orders'),{userId:me.uid,userEmail:me.email,userName:profile.name||'',planName:p.name,amount:p.price,discount,finalPrice:Math.max(0,p.price-discount),coupon:cp,txid:$('#txid').value,info:$('#info').value,status:'pending',createdAt:serverTimestamp(),referralCode:profile.usedReferral||''});closeModal();toast('Order sent to admin. Status: pending')}
window.openMethod=id=>{let m=methods.find(x=>x.id==id),ok=(m.levels||[]).some(l=>rank[profile.plan||'Basic']>=rank[l]||l=='Free');if(m.expired)return toast('This method is expired');if(ok)openModal(`<h2>${m.title}</h2><p>${m.content||m.description||''}</p>${m.link?`<a class="btn" target="_blank" href="${m.link}">Open Link</a>`:''}`);else{show('plans');toast('Upgrade plan to open this method')}};
window.openVip=()=>{if(rank[profile.plan||'Basic']>0&&settings.vipChannelLink)location.href=settings.vipChannelLink;else{show('plans');toast('Buy a plan first')}};
window.openAuth=mode=>openModal(`<h2>${mode=='login'?'Login':'Create Account'}</h2>${mode=='signup'?'<input id="name" placeholder="Full Name">':''}<input id="email" placeholder="Gmail / Email"><input id="pass" type="password" placeholder="Password">${mode=='signup'?'<input id="pass2" type="password" placeholder="Confirm Password"><input id="ref" placeholder="Referral Code Optional" value="'+(new URLSearchParams(location.search).get('ref')||'')+'">':''}<button class="primary" onclick="authGo('${mode}')">${mode=='login'?'Login':'Create Account'}</button>`);
window.authGo=async mode=>{try{let email=$('#email').value,pass=$('#pass').value;if(mode=='signup'){if(pass!==$('#pass2').value)return toast('Passwords not match');let cr=await createUserWithEmailAndPassword(auth,email,pass);await setDoc(doc(db,'users',cr.user.uid),{name:$('#name').value,email,plan:'Basic',referralCode:'REF'+cr.user.uid.slice(0,8).toUpperCase(),usedReferral:$('#ref').value.trim().toUpperCase(),createdAt:serverTimestamp()})}else await signInWithEmailAndPassword(auth,email,pass);closeModal()}catch(e){toast(e.message)}};
function openModal(h){$('#modalBody').innerHTML=h;$('#modal').classList.add('show')}window.closeModal=()=>$('#modal').classList.remove('show');
onAuthStateChanged(auth,u=>{me=u;if(!u){redraw();return}onSnapshot(doc(db,'users',u.uid),s=>{profile=s.data()||{};redraw();filterMethods('All')});onSnapshot(collection(db,'plans'),s=>{plans=s.docs.map(d=>({id:d.id,...d.data()}));if(!plans.length)plans=[{id:'standard',name:'Standard',price:15,durationDays:30,features:['Standard methods','Referral reward']},{id:'plus',name:'Plus',price:30,durationDays:90,features:['Plus methods','VIP access']},{id:'pro',name:'Pro',price:60,durationDays:180,features:['All methods','Private channel']}];redraw()});onSnapshot(collection(db,'methods'),s=>{methods=s.docs.map(d=>({id:d.id,...d.data()}));redraw();setTimeout(()=>filterMethods('All'),50)});onSnapshot(query(collection(db,'orders'),where('userId','==',u.uid)),s=>{orders=s.docs.map(d=>({id:d.id,...d.data()}));redraw()});onSnapshot(query(collection(db,'referralEarnings'),where('userId','==',u.uid)),s=>{earnings=s.docs.map(d=>d.data());redraw()});onSnapshot(collection(db,'coupons'),s=>coupons=s.docs.map(d=>({id:d.id,...d.data()})));onSnapshot(doc(db,'settings','main'),s=>{settings={...settings,...(s.data()||{})};redraw()})});
</script><style>
*{box-sizing:border-box}body{margin:0;background:#07111f;color:#f8fbff;font-family:Inter,system-ui,Arial}button,.btn{border:0;border-radius:16px;padding:14px 20px;background:#142740;color:#fff;font-weight:800;text-decoration:none;display:inline-block}button.primary,.primary{background:linear-gradient(135deg,#55e6ac,#58b7ff);color:#06111f}.danger{border:1px solid #ff6b8a;color:#ff7b91;background:#271323}.brand{display:flex;gap:14px;align-items:center;font-size:26px}.brand img{width:56px}.top{position:sticky;top:0;z-index:9;background:#07111fe8;display:flex;justify-content:space-between;align-items:center;padding:20px 5%;border-bottom:1px solid #1d3454}.hero{text-align:center;padding:80px 20px;background:radial-gradient(circle at 50% 0,#143b66,#07111f 70%)}.hero h1{font-size:clamp(38px,7vw,76px);line-height:1.05}.hero em{font-style:normal;background:linear-gradient(90deg,#55e6ac,#58b7ff);-webkit-background-clip:text;color:transparent}.hero p,.muted{color:#aebbd0;font-size:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:22px;margin:24px 0}.stats{padding:0 5% 60px}.stats div,.card{background:linear-gradient(180deg,#10243c,#091827);border:1px solid #213a5f;border-radius:24px;padding:24px;box-shadow:0 10px 30px #0005}.stats b,.card h2{display:block;font-size:32px}.side{position:fixed;left:0;top:0;bottom:0;width:270px;padding:24px;background:#081422;border-right:1px solid #1d3454;z-index:10}.nav{display:grid;gap:10px;margin:30px 0}.nav button{text-align:left}.nav .on{background:linear-gradient(135deg,#55e6ac,#58b7ff);color:#06111f}.main{margin-left:270px;padding:34px;min-height:100vh}.page{display:none}.page.active{display:block}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;background:#0d1c31;border:1px solid #1e3658;border-radius:18px;padding:16px;margin:10px 0;flex-wrap:wrap}.tag{padding:6px 10px;border-radius:99px;background:#234a73}.pending{background:#725a23}.approved{background:#146c43}.reject{background:#6c1b2b}input,textarea,select{width:100%;padding:14px;border-radius:14px;background:#07111f;border:1px solid #284364;color:#fff;margin:8px 0}.tabs{display:flex;gap:10px;overflow:auto;margin:20px 0}.modal{display:none;position:fixed;inset:0;background:#0009;z-index:99;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.box{max-width:480px;width:100%;background:#0b192b;border:1px solid #29466c;border-radius:24px;padding:24px}.x{float:right}#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0e253d;border:1px solid #315b89;padding:14px 18px;border-radius:14px;display:none;z-index:100}#toast.show{display:block}@media(max-width:760px){.top{padding:12px}.brand{font-size:22px}.side{position:relative;width:100%;display:block}.side .brand{justify-content:center}.nav{grid-template-columns:repeat(2,1fr)}.nav button{text-align:center;padding:12px}.danger{width:100%}.main{margin:0;padding:18px}.row{display:block}.grid{grid-template-columns:1fr}.hero{padding:42px 14px}.hero button{width:100%;margin:6px 0}.stats{grid-template-columns:repeat(2,1fr);padding:0 14px 40px}.stats div{padding:16px;text-align:center}.stats b{font-size:30px}}
</style></head><body><div id="app"></div><div id="modal" class="modal"><div class="box"><button class="x" onclick="closeModal()">×</button><div id="modalBody"></div></div></div><div id="toast"></div></body></html>
